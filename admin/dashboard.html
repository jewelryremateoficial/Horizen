<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — FinancialOS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --p:#635bff;--p2:#4b45c6;--sec:#8b7cff;
  --bg:#f6f9fc;--bg2:#ffffff;--bg3:#f3f5f9;
  --border:rgba(10,37,64,0.10);
  --text:#0a2540;--muted:#697386;--muted2:#8792a2;
  --ok:#0e9f6e;--warn:#d97706;--danger:#e2435f;--info:#2563eb;
  --sidebar-w:240px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;font-size:14px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;font-variant-numeric:tabular-nums}
a{text-decoration:none;color:inherit}
button{font-family:'Inter',sans-serif}

/* ── SIDEBAR ───────────────────────────────────── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto}
.sidebar-logo{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem}
.sidebar-logo .name{font-size:1rem;font-weight:900;letter-spacing:-.4px}
.sidebar-logo .name span{color:var(--p)}
.sidebar-logo .badge{background:rgba(244,63,94,.15);color:#f87171;font-size:.6rem;font-weight:800;padding:.15rem .45rem;border-radius:4px;letter-spacing:.4px;text-transform:uppercase}
.sidebar-section{padding:.5rem .75rem;margin-top:.25rem}
.sidebar-label{font-size:.65rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;padding:.5rem .5rem .3rem}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.6rem .75rem;border-radius:8px;color:var(--muted);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-item:hover{background:rgba(10,37,64,.05);color:var(--text)}
.nav-item.active{background:rgba(0,212,170,.08);color:var(--p);font-weight:600}
.nav-item .icon{width:16px;height:16px;flex-shrink:0}
.nav-item .badge-count{margin-left:auto;background:var(--danger);color:#fff;font-size:.6rem;font-weight:700;padding:.1rem .4rem;border-radius:50px;min-width:18px;text-align:center}
.sidebar-footer{margin-top:auto;padding:1rem .75rem;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:.65rem;padding:.6rem .5rem;border-radius:8px;cursor:pointer;transition:background .2s}
.user-row:hover{background:rgba(10,37,64,.05)}
.avatar-sm{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--sec));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.7rem;color:#fff;flex-shrink:0}
.user-info .user-name{font-size:.8rem;font-weight:600;line-height:1.2}
.user-info .user-role{font-size:.68rem;color:var(--muted);line-height:1}

/* ── MAIN ─────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
.topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.75rem;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;gap:1rem}
.topbar-left{display:flex;align-items:center;gap:.5rem}
.breadcrumb{display:flex;align-items:center;gap:.4rem;font-size:.82rem;color:var(--muted)}
.breadcrumb .current{color:var(--text);font-weight:600}
.topbar-right{display:flex;align-items:center;gap:.75rem}
.search-box{display:flex;align-items:center;gap:.5rem;background:rgba(10,37,64,.04);border:1px solid var(--border);border-radius:8px;padding:.4rem .75rem;width:220px;transition:all .2s}
.search-box:focus-within{border-color:var(--p);background:rgba(0,212,170,.04)}
.search-box input{background:none;border:none;color:var(--text);font-size:.82rem;outline:none;width:100%;font-family:'Inter',sans-serif}
.search-box input::placeholder{color:var(--muted2)}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:rgba(10,37,64,.04);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative}
.icon-btn:hover{background:rgba(10,37,64,.08);border-color:rgba(10,37,64,.15)}
.live-dot{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--ok)}
.live-dot::before{content:'';width:6px;height:6px;background:var(--ok);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
.page{flex:1;padding:1.75rem;overflow-y:auto}

/* ── SHARED COMPONENTS ─────────────────────────── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
.page-title{font-size:1.3rem;font-weight:800;letter-spacing:-.5px}
.page-subtitle{font-size:.8rem;color:var(--muted);margin-top:.15rem}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--p);color:#fff}
.btn-primary:hover{background:var(--p2)}
.btn-secondary{background:rgba(10,37,64,.06);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{background:rgba(10,37,64,.1)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}
.btn-danger:hover{background:rgba(239,68,68,.2)}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1rem;margin-bottom:1.5rem}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.25rem 1rem;transition:border-color .2s;position:relative;overflow:hidden}
.kpi-card:hover{border-color:rgba(10,37,64,.14)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:14px 14px 0 0;opacity:.7}
.kpi-card.teal::before{background:var(--p)}
.kpi-card.purple::before{background:var(--sec)}
.kpi-card.green::before{background:var(--ok)}
.kpi-card.warn::before{background:var(--warn)}
.kpi-card.danger::before{background:var(--danger)}
.kpi-card.info::before{background:var(--info)}

/* ── FINANCIAL HEALTH KPIs (gigantes) ────────────────── */
.fin-wrap{background:linear-gradient(135deg,rgba(0,212,170,.06) 0%,rgba(99,102,241,.04) 100%);
  border:1px solid rgba(0,212,170,.18);border-radius:16px;padding:1.5rem 1.5rem 1.25rem;
  margin-bottom:1.5rem;position:relative;overflow:hidden}
.fin-wrap::before{content:'';position:absolute;width:320px;height:320px;
  background:radial-gradient(circle,rgba(0,212,170,.07) 0%,transparent 70%);
  top:-80px;right:-80px;pointer-events:none}
.fin-hdr{display:flex;align-items:center;gap:.65rem;margin-bottom:1.25rem}
.fin-tag{background:rgba(0,212,170,.14);border:1px solid rgba(0,212,170,.28);color:var(--p);
  font-size:.65rem;font-weight:800;padding:.22rem .65rem;border-radius:50px;letter-spacing:.5px;text-transform:uppercase}
.fin-ttl{font-size:.85rem;font-weight:700;color:var(--muted2)}
.fin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem}
.fin-kpi{background:rgba(13,21,38,.9);border:1px solid var(--border);border-radius:13px;
  padding:1.25rem 1.35rem;transition:border-color .3s}
.fin-kpi.k-green{border-color:rgba(0,212,170,.3)}
.fin-kpi.k-yellow{border-color:rgba(245,158,11,.3)}
.fin-kpi.k-red{border-color:rgba(244,63,94,.35)}
.fin-lbl{font-size:.65rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.55px;margin-bottom:.5rem}
.fin-val{font-size:2.2rem;font-weight:900;letter-spacing:-1.4px;line-height:1;margin-bottom:.4rem}
.fin-val.v-green{color:var(--p)}
.fin-val.v-yellow{color:var(--warn)}
.fin-val.v-red{color:var(--danger)}
.fin-sub{font-size:.73rem;color:var(--muted2);line-height:1.55}
.fin-bar{margin-top:.8rem;height:4px;background:rgba(10,37,64,.06);border-radius:50px;overflow:hidden}
.fin-bar-fill{height:100%;border-radius:50px;transition:width .9s ease}
.fin-bar-txt{font-size:.65rem;color:var(--muted2);margin-top:.28rem}
.sem-row{display:flex;align-items:center;gap:.6rem;margin-top:.25rem}
.sem-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.sem-dot.s-green{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.sem-dot.s-yellow{background:var(--warn);box-shadow:0 0 8px var(--warn)}
.sem-dot.s-red{background:var(--danger);box-shadow:0 0 8px var(--danger);animation:blink 1.1s infinite}
@keyframes blink{0%,100%{box-shadow:0 0 8px var(--danger)}50%{box-shadow:0 0 20px rgba(244,63,94,.6)}}
.sem-lbl{font-size:.88rem;font-weight:800}
.fin-chips{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.7rem}
.fin-chip{font-size:.65rem;font-weight:700;padding:.15rem .5rem;border-radius:50px;border:1px solid}
.fin-sk{background:linear-gradient(90deg,rgba(10,37,64,.04) 25%,rgba(10,37,64,.08) 50%,rgba(10,37,64,.04) 75%);
  background-size:400% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.kpi-label{display:flex;align-items:center;gap:.4rem;font-size:.67rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.65rem}
.kpi-value{font-size:1.75rem;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:.4rem}
.kpi-delta{display:flex;align-items:center;gap:.3rem;font-size:.75rem;font-weight:600}
.kpi-delta.up{color:var(--ok)}
.kpi-delta.down{color:var(--danger)}
.kpi-delta.neutral{color:var(--muted)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
.card-title{font-size:.82rem;font-weight:700}
.card-body{padding:1.25rem}

/* TABLE */
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border);gap:.75rem;flex-wrap:wrap}
.table-actions{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.filter-select{display:flex;align-items:center;gap:.4rem;background:rgba(10,37,64,.04);border:1px solid var(--border);border-radius:7px;padding:.35rem .7rem;font-size:.75rem;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;outline:none;transition:all .2s}
.filter-select:focus{border-color:var(--p);color:var(--text)}
.search-input{background:rgba(10,37,64,.04);border:1px solid var(--border);border-radius:7px;padding:.35rem .75rem;font-size:.78rem;color:var(--text);font-family:'Inter',sans-serif;outline:none;width:200px;transition:all .2s}
.search-input:focus{border-color:var(--p)}
.search-input::placeholder{color:var(--muted2)}
table{width:100%;border-collapse:collapse}
th{font-size:.67rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;padding:.7rem 1.25rem;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--muted)}
td{padding:.75rem 1.25rem;font-size:.82rem;border-bottom:1px solid rgba(10,37,64,.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(10,37,64,.02)}
.pill{display:inline-flex;align-items:center;padding:.2rem .6rem;border-radius:50px;font-size:.68rem;font-weight:700;letter-spacing:.3px}
.pill-green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.pill-blue{background:rgba(99,102,241,.12);color:#818cf8;border:1px solid rgba(99,102,241,.2)}
.pill-amber{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.pill-red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.pill-gray{background:rgba(10,37,64,.06);color:var(--muted);border:1px solid var(--border)}
.row-actions{display:flex;gap:.35rem}
.row-btn{background:rgba(10,37,64,.05);border:1px solid var(--border);border-radius:5px;padding:.25rem .6rem;font-size:.72rem;cursor:pointer;color:var(--muted);font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.row-btn:hover{background:rgba(10,37,64,.1);color:var(--text)}
.row-btn.danger{color:#f87171;border-color:rgba(239,68,68,.2)}
.row-btn.danger:hover{background:rgba(239,68,68,.1)}
.table-footer{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;border-top:1px solid var(--border);font-size:.75rem;color:var(--muted)}
.pagination{display:flex;gap:.3rem}
.page-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Inter',sans-serif}
.page-btn.active{background:rgba(0,212,170,.1);border-color:rgba(0,212,170,.2);color:var(--p)}
.page-btn:hover:not(.active){background:rgba(10,37,64,.05);color:var(--text)}

/* CHART */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:1.5rem}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.25rem}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.chart-title{font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.chart-canvas-wrap{position:relative;height:200px}

/* WATERFALL */
.waterfall-items{display:flex;flex-direction:column;gap:.6rem;margin-top:.5rem}
.wf-item{display:flex;align-items:center;gap:.75rem}
.wf-bar-wrap{flex:1;height:8px;background:rgba(10,37,64,.05);border-radius:4px;overflow:hidden}
.wf-bar{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.wf-label{font-size:.75rem;color:var(--muted);width:100px;flex-shrink:0}
.wf-val{font-size:.78rem;font-weight:700;width:80px;text-align:right;flex-shrink:0}

/* ACTIVITY FEED */
.feed-item{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 1.25rem;border-bottom:1px solid rgba(10,37,64,.03);transition:background .2s}
.feed-item:last-child{border-bottom:none}
.feed-item:hover{background:rgba(10,37,64,.02)}
.feed-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;margin-top:1px}
.fi-green{background:rgba(34,197,94,.1);color:#4ade80}
.fi-blue{background:rgba(99,102,241,.1);color:#818cf8}
.fi-amber{background:rgba(245,158,11,.1);color:#fbbf24}
.fi-red{background:rgba(239,68,68,.1);color:#f87171}
.feed-body{flex:1;min-width:0}
.feed-title{font-size:.8rem;font-weight:600;line-height:1.3}
.feed-sub{font-size:.72rem;color:var(--muted);margin-top:.1rem}
.feed-time{font-size:.68rem;color:var(--muted2);white-space:nowrap}

/* BOTTOM ROW */
.bottom-row{display:grid;grid-template-columns:1.4fr 1fr;gap:1rem;margin-bottom:1.5rem}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9000;padding:1rem;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:540px;overflow:hidden;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-title{font-size:1rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:.25rem;border-radius:4px;transition:color .2s;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:1.5rem}
.modal-footer{display:flex;gap:.75rem;justify-content:flex-end;padding:1rem 1.5rem;border-top:1px solid var(--border)}
.form-group{margin-bottom:1.1rem}
.form-label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.3px}
.form-input,.form-select{width:100%;background:rgba(10,37,64,.04);border:1px solid var(--border);border-radius:8px;padding:.6rem .85rem;color:var(--text);font-size:.88rem;font-family:'Inter',sans-serif;outline:none;transition:all .2s}
.form-input:focus,.form-select:focus{border-color:var(--p);background:rgba(0,212,170,.04)}
.form-select option{background:var(--bg2)}
.info-row{display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid rgba(10,37,64,.04);font-size:.82rem}
.info-row:last-child{border-bottom:none}
.info-row .label{color:var(--muted)}
.info-row .value{font-weight:600;max-width:250px;text-align:right;word-break:break-all}
.section-divider{font-size:.72rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;margin:1.25rem 0 .75rem}

/* PLAN BREAKDOWN */
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}

/* SETTINGS */
.settings-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:1.25rem;overflow:hidden}
.settings-section-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
.settings-section-title{font-size:.88rem;font-weight:700}
.settings-section-sub{font-size:.75rem;color:var(--muted);margin-top:.2rem}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem;border-bottom:1px solid rgba(10,37,64,.04);gap:1rem}
.settings-row:last-child{border-bottom:none}
.settings-row-info .label{font-size:.85rem;font-weight:600}
.settings-row-info .sub{font-size:.75rem;color:var(--muted);margin-top:.15rem}
.settings-val{font-size:.82rem;color:var(--muted);font-family:monospace;background:rgba(10,37,64,.04);padding:.3rem .65rem;border-radius:6px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toggle{position:relative;width:38px;height:21px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:rgba(10,37,64,.1);border-radius:21px;cursor:pointer;transition:background .2s}
.toggle input:checked + .toggle-track{background:var(--p)}
.toggle-track::after{content:'';position:absolute;width:15px;height:15px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s}
.toggle input:checked + .toggle-track::after{transform:translateX(17px)}
.danger-zone{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.15)}
.danger-zone .settings-section-header{border-color:rgba(239,68,68,.15)}
.danger-zone .settings-section-title{color:#f87171}

/* TOAST */
.toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;display:flex;flex-direction:column;gap:.5rem;z-index:9999}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,rgba(10,37,64,.04) 25%,rgba(10,37,64,.08) 50%,rgba(10,37,64,.04) 75%);background-size:400% 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:16px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* EMPTY STATE */
.empty-state{text-align:center;padding:3rem 1.5rem;color:var(--muted)}
.empty-state .icon{font-size:2.5rem;margin-bottom:.75rem}
.empty-state .title{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:.3rem}
.empty-state .sub{font-size:.8rem}

/* PERIOD SELECTOR */
.period-selector{display:flex;gap:.35rem;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.25rem}
.period-btn{padding:.3rem .75rem;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'Inter',sans-serif;transition:all .2s}
.period-btn.active{background:rgba(0,212,170,.1);color:var(--p);border:1px solid rgba(0,212,170,.2)}

/* ALERT BANNER */
.alert-banner{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:.85rem 1.25rem;display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;font-size:.82rem}

/* COPY BTN */

.copy-btn:hover{background:rgba(10,37,64,.06);color:var(--text)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease}
@media(max-width:1100px){.charts-row,.bottom-row{grid-template-columns:1fr}.plan-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.sidebar{display:none}.kpi-grid{grid-template-columns:repeat(2,1fr)}.plan-grid{grid-template-columns:1fr}}
</style>
</head>

<!-- ══ MAIN ═══════════════════════════════════════ -->

        <span>FinancialOS</span>

<script>
// ══ STATE ════════════════════════════════════════
let allCustomers = [], allPayments = [];
let filteredCustomers = [], filteredPayments = [];
let custPage = 1, payPage = 1;
const PAGE_SIZE = 10;
let sortKey = 'created_at', sortAsc = false;
let mrrChart = null;
let currentPageName = 'overview';
let adminProfile = null, adminSession = null;

// ══ INIT ═════════════════════════════════════════
(async () => {
  const auth = await requireAdmin();
  if (!auth) return;
  adminSession = auth.session;
  adminProfile = auth.profile;

  const email = adminSession.user.email || '';
  const initials = (adminProfile?.full_name || email).charAt(0).toUpperCase();
  document.getElementById('adminName').textContent = adminProfile?.full_name || email;
  document.getElementById('adminAvatar').textContent = initials;

  await loadAllData();
  setupRealtime();
  setPage('overview', document.querySelector('.nav-item[data-page="overview"]'));
})();

async function loadAllData() {
  const [cRes, pRes] = await Promise.all([
    db.from('profiles').select('*').order('created_at', { ascending: false }),
    db.from('payments').select('*').order('created_at', { ascending: false })
  ]);
  allCustomers = cRes.data || [];
  allPayments   = pRes.data || [];
  filteredCustomers = [...allCustomers];
  filteredPayments  = [...allPayments];
  const trials = allCustomers.filter(u => !u.subscription_status || u.subscription_status === 'trial');
  document.getElementById('trialCount').textContent = trials.length || '0';
}

function setupRealtime() {
  subscribeToTable('profiles', async () => { await loadAllData(); if (currentPageName === 'overview') renderOverview(); if (currentPageName === 'customers') renderCustomers(); });
  subscribeToTable('payments', async () => { await loadAllData(); if (currentPageName === 'overview') renderOverview(); if (currentPageName === 'payments') renderPayments(); });
}

// ══ ROUTING ══════════════════════════════════════
function setPage(name, el) {
  currentPageName = name;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  const titles = { overview:'Overview', customers:'Clientes', payments:'Pagos', revenue:'Revenue', plans:'Planes & Precios', settings:'Configuración' };
  document.getElementById('pageTitle').textContent = titles[name] || name;
  const content = document.getElementById('pageContent');
  content.style.animation = 'none';
  content.offsetHeight;
  content.style.animation = 'fadeIn .3s ease';
  switch(name) {
    case 'overview':  renderOverview(); loadFinancialHealth(); break;
    case 'customers': filteredCustomers = [...allCustomers]; custPage = 1; renderCustomers(); break;
    case 'payments':  filteredPayments = [...allPayments];   payPage = 1;  renderPayments(); break;
    case 'revenue':   renderRevenue(); break;
    case 'plans':     renderPlans(); break;
    case 'settings':  renderSettings(); break;
  }
}

// ══ PAGE: OVERVIEW ═══════════════════════════════
function renderOverview() {
  const active    = allCustomers.filter(u => u.subscription_status === 'active');
  const trial     = allCustomers.filter(u => !u.subscription_status || u.subscription_status === 'trial');
  const cancelled = allCustomers.filter(u => u.subscription_status === 'cancelled');
  const mrr  = active.reduce((s, u) => s + (PLANS[u.plan]?.price || 0), 0);
  const arr  = mrr * 12;
  const arpu = active.length > 0 ? mrr / active.length : 0;
  const churn = allCustomers.length > 1 ? ((cancelled.length / allCustomers.length)*100).toFixed(1) : '0.0';

  const kpis = [
    { label:'MRR', val:fmt(mrr), delta:'+8.3%', dir:'up', color:'teal', note:'vs. mes anterior' },
    { label:'ARR', val:fmt(arr), delta:'+8.3%', dir:'up', color:'purple', note:'proyección anual' },
    { label:'Activos', val:active.length, delta:'+'+active.length, dir:'up', color:'green', note:'suscripciones pagadas' },
    { label:'Trials', val:trial.length, delta:trial.length, dir:'neutral', color:'info', note:'en período de prueba' },
    { label:'Churn Rate', val:churn+'%', delta:churn < 2 ? '▼ Saludable':'▲ Atención', dir:churn < 2 ? 'up':'down', color:churn < 5 ? 'warn':'danger', note:'cancelaciones/total' },
    { label:'ARPU', val:fmt(arpu), delta:'Promedio', dir:'up', color:'teal', note:'ingreso por usuario' }
  ];

  const recentCusts = allCustomers.slice(0,6);

  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard Administrativo</div>
        <div class="page-subtitle">Última actualización: ${fmtRelative(new Date())}</div>
      </div>
      <div class="period-selector">
        <button class="period-btn" onclick="setPeriod(7,this)">7D</button>
        <button class="period-btn active" onclick="setPeriod(30,this)">30D</button>
        <button class="period-btn" onclick="setPeriod(90,this)">90D</button>
        <button class="period-btn" onclick="setPeriod(365,this)">12M</button>
      </div>
    </div>

    <!-- ── 3 KPIs Financieros — Mi Empresa ──────────────── -->
    <div class="fin-wrap" id="finHealthWrap">
      <div class="fin-hdr" style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
        <div class="fin-tag">Mi Empresa</div>
        <div class="fin-ttl" style="flex:1">Salud financiera en tiempo real · SAT</div>
      </div>
      <div class="fin-grid">

        <!-- KPI 1: Liquidez Real -->
        <div class="fin-kpi" id="fkLiqCard">
          <div class="fin-lbl">💧 Liquidez Real</div>
          <div class="fin-val v-green fin-sk" id="fkLiq" style="min-height:2.2rem">&nbsp;</div>
          <div class="fin-sub" id="fkLiqSub">Calculando saldo disponible...</div>
          <div class="fin-bar">
            <div class="fin-bar-fill" id="fkRunwayBar" style="width:0%;background:var(--p)"></div>
          </div>
          <div class="fin-bar-txt" id="fkRunwayTxt">— días de runway</div>
        </div>

        <!-- KPI 2: Margen Neto Real -->
        <div class="fin-kpi" id="fkMarCard">
          <div class="fin-lbl">📈 Margen Neto Real</div>
          <div class="fin-val v-green fin-sk" id="fkMar" style="min-height:2.2rem">&nbsp;</div>
          <div class="fin-sub" id="fkMarSub">Calculando flujo 30 días...</div>
          <div class="fin-chips" id="fkMarChips"></div>
        </div>

        <!-- KPI 3: Supervivencia (Semáforo + Runway) -->
        <div class="fin-kpi" id="fkSemCard">
          <div class="fin-lbl">🚦 Supervivencia</div>
          <div class="sem-row fin-sk" id="fkSemRow" style="min-height:1.3rem;width:130px;border-radius:8px">&nbsp;</div>
          <div class="fin-sub" id="fkSemSub" style="margin-top:.7rem">Evaluando indicadores...</div>
          <div class="fin-chips" id="fkAlertChips"></div>
        </div>

      </div>
    </div>
    <!-- ── /KPIs Financieros ─────────────────────────────── -->

    <div class="kpi-grid">
      ${kpis.map(k => `
        <div class="kpi-card ${k.color}">
          <div class="kpi-label">${k.label}</div>
          <div class="kpi-value">${k.val}</div>
          <div class="kpi-delta ${k.dir}">
            ${k.dir==='up'?'↑':k.dir==='down'?'↓':''}
            ${k.delta} &nbsp;<span style="color:var(--muted2);font-weight:400">${k.note}</span>
          </div>
        </div>`).join('')}
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">MRR — Ingresos Recurrentes</span>
          <span class="pill pill-green">↑ 8.3%</span>
        </div>
        <div class="chart-canvas-wrap"><canvas id="mrrChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">MRR Waterfall</span>
          <span style="font-size:.72rem;color:var(--muted)">Este mes</span>
        </div>
        <div class="waterfall-items" id="waterfallItems"></div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Últimos clientes</span>
          <button class="btn btn-secondary" onclick="setPage('customers',document.querySelector('[data-page=customers]'))" style="font-size:.75rem;padding:.3rem .7rem">Ver todos →</button>
        </div>
        <table>
          <thead><tr>
            <th>Cliente</th><th>Plan</th><th>Estado</th><th>MRR</th><th>Acciones</th>
          </tr></thead>
          <tbody>
            ${recentCusts.map(u => `
              <tr>
                <td>
                  <div style="font-weight:600">${u.company_name || u.full_name || '—'}</div>
                  <div style="color:var(--muted);font-size:.75rem">${u.id?.slice(0,12)}…</div>
                </td>
                <td>${planBadge(u.plan || 'free')}</td>
                <td>${statusBadge(u.subscription_status || 'trial')}</td>
                <td style="font-weight:700">${fmt(PLANS[u.plan]?.price || 0)}</td>
                <td><div class="row-actions">
                  <button class="row-btn" onclick="openCustomer('${u.id}')">Ver</button>
                  <button class="row-btn" onclick="openEditPlan('${u.id}')">Plan</button>
                </div></td>
              </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:2rem">Sin clientes aún</td></tr>'}
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Actividad reciente</span></div>
        <div style="max-height:320px;overflow-y:auto">
          ${renderActivityHTML()}
        </div>
      </div>
    </div>

    <div class="plan-grid" id="planBreakdown">
      ${renderPlanBreakdownHTML()}
    </div>
  `;

  renderMRRChart();
  renderWaterfall();
}

// ══ FINANCIAL HEALTH — 3 KPIs gigantes desde get_liquidity_metrics ══
async function loadFinancialHealth() {
  // Guarda referencia del nodo; si el usuario cambió de página antes de que
  // terminara el fetch, los getElementById devolverán null y nos detenemos.
  const wrap = document.getElementById('finHealthWrap');
  if (!wrap) return;

  let m;
  try {
    const { data, error } = await db.rpc('get_liquidity_metrics',
      { p_user_id: adminSession.user.id });
    if (error || !data) { renderFinHealthFallback(); return; }
    m = data;
  } catch(e) { renderFinHealthFallback(); return; }

  // Verificar que los nodos siguen en el DOM (el usuario puede haber navegado)
  if (!document.getElementById('fkLiq')) return;

  // ── KPI 1: Liquidez Real ────────────────────────────────────
  const liqEl  = document.getElementById('fkLiq');
  const liqNeg = m.caja_libre < 0;
  liqEl.className = `fin-val ${liqNeg ? 'v-red' : 'v-green'}`;
  liqEl.textContent = fmt(m.caja_libre);

  document.getElementById('fkLiqSub').innerHTML =
    `<strong>Disponible:</strong> ${fmt(m.caja_total)}` +
    (m.debts_30d > 0
      ? `<br>− Deudas 30d: <span style="color:var(--warn)">${fmt(m.debts_30d)}</span>` : '') +
    (m.cutting_reserve > 0
      ? `<br>− Corte TDC: <span style="color:var(--warn)">${fmt(m.cutting_reserve)}</span>` : '') +
    (m.tax_pending > 0
      ? `<br>− SAT pendiente: <span style="color:var(--danger)">${fmt(m.tax_pending)}</span>` : '');

  const rPct  = Math.min(100, (m.runway_days / 180) * 100);
  const rColor = m.runway_days < 30 ? 'var(--danger)' : m.runway_days < 90 ? 'var(--warn)' : 'var(--p)';
  document.getElementById('fkRunwayBar').style.cssText = `width:${rPct}%;background:${rColor}`;
  document.getElementById('fkRunwayTxt').innerHTML = m.runway_days >= 999
    ? '<span style="color:var(--p)">∞ Sin egresos registrados</span>'
    : `<span style="color:${rColor};font-weight:700">${m.runway_days} días de runway</span>`;

  document.getElementById('fkLiqCard').className =
    `fin-kpi ${liqNeg ? 'k-red' : 'k-green'}`;

  // ── KPI 2: Margen Neto Real ─────────────────────────────────
  const marEl    = document.getElementById('fkMar');
  const marClass = m.margen_neto >= 15 ? 'v-green' : m.margen_neto >= 0 ? 'v-yellow' : 'v-red';
  marEl.className   = `fin-val ${marClass}`;
  marEl.textContent = m.margen_neto.toFixed(1) + '%';

  document.getElementById('fkMarSub').innerHTML =
    `Ingresos: <strong>${fmt(m.income_30d)}</strong><br>` +
    `Egresos: ${fmt(m.expense_30d)} · Burn: ${fmt(m.burn_rate)}/mes`;

  const marChipColor = m.margen_neto >= 0 ? 'var(--ok)' : 'var(--danger)';
  document.getElementById('fkMarChips').innerHTML =
    `<span class="fin-chip" style="background:${marChipColor}1a;color:${marChipColor};border-color:${marChipColor}44">
      ${m.margen_neto >= 0 ? '▲' : '▼'} ${Math.abs(m.margen_neto).toFixed(1)}% últimos 30d
    </span>` +
    (m.income_30d > 0
      ? `<span class="fin-chip" style="background:rgba(10,37,64,.05);color:var(--muted);border-color:var(--border)">
          Utilidad: ${fmt(m.income_30d - m.expense_30d)}</span>` : '');

  document.getElementById('fkMarCard').className =
    `fin-kpi ${m.margen_neto >= 15 ? 'k-green' : m.margen_neto >= 0 ? 'k-yellow' : 'k-red'}`;

  // ── KPI 3: Supervivencia (Semáforo + alertas) ───────────────
  const semMeta = {
    green:  { lbl: 'SALUDABLE',       color: 'var(--ok)',     msg: 'Empresa financieramente estable.' },
    yellow: { lbl: 'REQUIERE ATENCIÓN', color: 'var(--warn)', msg: 'Hay compromisos próximos a vencer.' },
    red:    { lbl: 'ALERTA CRÍTICA',   color: 'var(--danger)', msg: '¡Acción inmediata requerida!' }
  };
  const sem = semMeta[m.semaforo] || semMeta.green;

  document.getElementById('fkSemRow').className = '';
  document.getElementById('fkSemRow').innerHTML =
    `<div class="sem-row">
      <div class="sem-dot s-${m.semaforo}"></div>
      <div class="sem-lbl" style="color:${sem.color}">${sem.lbl}</div>
    </div>`;
  document.getElementById('fkSemSub').textContent = sem.msg;

  const alerts = [];
  if (m.runway_days < 30 && m.runway_days < 999)
    alerts.push({ t: `⚠️ Runway: ${m.runway_days}d`, c: 'var(--danger)' });
  if (m.cutting_reserve > 0)
    alerts.push({ t: `📅 Corte TDC: ${fmt(m.cutting_reserve)}`, c: 'var(--warn)' });
  if (m.tax_pending > 0)
    alerts.push({ t: `🧾 SAT: ${fmt(m.tax_pending)}`, c: 'var(--warn)' });
  if (m.caja_libre < 0)
    alerts.push({ t: '🔴 Caja libre negativa', c: 'var(--danger)' });

  document.getElementById('fkAlertChips').innerHTML = alerts.length
    ? alerts.map(a =>
        `<span class="fin-chip" style="background:${a.c}1a;color:${a.c};border-color:${a.c}44">${a.t}</span>`
      ).join('')
    : `<span class="fin-chip" style="background:rgba(16,185,129,.1);color:var(--ok);border-color:rgba(16,185,129,.25)">✓ Sin alertas</span>`;

  document.getElementById('fkSemCard').className = `fin-kpi k-${m.semaforo}`;
}

function renderFinHealthFallback() {
  // La función SQL no está disponible aún — muestra instrucción
  const wrap = document.getElementById('finHealthWrap');
  if (!wrap) return;
  document.getElementById('fkLiq').className  = 'fin-val v-green';
  document.getElementById('fkLiq').textContent = '—';
  document.getElementById('fkLiqSub').innerHTML =

function renderMRRChart() {
  const ctx = document.getElementById('mrrChart');
  if (!ctx) return;
  if (mrrChart) mrrChart.destroy();
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const active = allCustomers.filter(u => u.subscription_status === 'active');
  const baseMRR = active.reduce((s,u) => s + (PLANS[u.plan]?.price||0), 0) || 0;
  const data = months.map((_,i) => Math.max(0, baseMRR - (11-i) * Math.floor(baseMRR * 0.07)));
  mrrChart = new Chart(ctx, {
    type:'line',
    data:{ labels:months, datasets:[{ label:'MRR', data, borderColor:'#635bff',
      backgroundColor:(c) => { const g = c.chart.ctx.createLinearGradient(0,0,0,200); g.addColorStop(0,'rgba(0,212,170,0.25)'); g.addColorStop(1,'rgba(0,212,170,0)'); return g; },
      fill:true, tension:0.4, borderWidth:2.5, pointRadius:0, pointHoverRadius:5, pointHoverBackgroundColor:'#635bff' }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'#161b22', borderColor:'rgba(10,37,64,0.1)', borderWidth:1, titleColor:'#94a3b8', bodyColor:'#e2e8f0', padding:12,
        callbacks:{ label: c => ` MRR: ${new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0}).format(c.raw)}` }}},
      scales:{ x:{ grid:{color:'rgba(10,37,64,0.04)'}, ticks:{color:'#64748b',font:{size:11}} },
               y:{ grid:{color:'rgba(10,37,64,0.04)'}, ticks:{color:'#64748b',font:{size:11}, callback: v => '$'+(v>=1000?(v/1000).toFixed(0)+'K':v)} }}}
  });
}

function renderWaterfall() {
  const el = document.getElementById('waterfallItems');
  if (!el) return;
  const active = allCustomers.filter(u => u.subscription_status === 'active');
  const mrr = active.reduce((s,u) => s + (PLANS[u.plan]?.price||0), 0);
  const prev = Math.floor(mrr * 0.88);
  const nuevo = Math.floor(mrr * 0.15);
  const exp   = Math.floor(mrr * 0.02);
  const contr = -Math.floor(mrr * 0.015);
  const churn = -Math.floor(mrr * 0.055);
  const items = [
    { label:'MRR anterior', val:prev, color:'var(--muted)', pct:88 },
    { label:'+ Nuevo', val:nuevo, color:'var(--ok)', pct:15 },
    { label:'+ Expansión', val:exp, color:'var(--p)', pct:3 },
    { label:'- Contracción', val:contr, color:'var(--warn)', pct:2 },
    { label:'- Churn', val:churn, color:'var(--danger)', pct:6 },
    { label:'MRR Neto', val:mrr, color:'var(--p)', pct:100 }
  ];
  el.innerHTML = items.map(it => `
    <div class="wf-item">
      <span class="wf-label">${it.label}</span>
      <div class="wf-bar-wrap"><div class="wf-bar" style="width:${Math.abs(it.pct)}%;background:${it.color};opacity:.8"></div></div>
      <span class="wf-val" style="color:${it.val>=0?'var(--text)':'var(--danger)'}">
        ${it.val>=0?'':'-'}${fmt(Math.abs(it.val))}
      </span>
    </div>`).join('');
}

function searchCustomers(q) {
  const plan   = document.getElementById('custPlanFilter')?.value || '';
  const status = document.getElementById('custStatusFilter')?.value || '';
  filteredCustomers = allCustomers.filter(u =>
    (!plan   || u.plan === plan) &&
    (!status || u.subscription_status === status) &&
    (!q || (u.company_name||'').toLowerCase().includes(q.toLowerCase()) ||
           (u.full_name||'').toLowerCase().includes(q.toLowerCase()) ||
           (u.email||'').toLowerCase().includes(q.toLowerCase()) ||
           (u.rfc||'').toLowerCase().includes(q.toLowerCase()) ||
           (u.id||'').toLowerCase().includes(q.toLowerCase()))
  );
  custPage = 1;
  document.getElementById('custCount').textContent = `${filteredCustomers.length} clientes`;
  renderCustTable();
}

function filterCustomers() {
  const q      = document.getElementById('custSearch')?.value || '';
  searchCustomers(q);
}

function sortCust(key) {
  if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
  filteredCustomers.sort((a,b) => {
    const va = a[key]||'', vb = b[key]||'';
    return sortAsc ? (va<vb?-1:1) : (va>vb?-1:1);
  });
  renderCustTable();
}

function exportCustomersCSV() {
  const rows = [['Empresa','RFC','Plan','Estado','MRR','Desde']];

  ]));
  downloadCSV(rows, `clientes-financialos-${new Date().toISOString().slice(0,10)}`);

}

async function savePlan(id) {
  const plan   = document.getElementById('newPlan').value;
  const status = document.getElementById('newStatus').value;
  const { error } = await db.from('profiles').update({ plan, subscription_status: status }).eq('id', id);
  if (error) { toast('Error: ' + error.message, 'err'); return; }
  closeModal();
  await loadAllData();
  if (currentPageName === 'customers') renderCustomers();
  if (currentPageName === 'overview') renderOverview();
  toast('Plan actualizado correctamente', 'ok');
}

async function createCustomer() {
  const email = document.getElementById('newEmail').value.trim();
  const pass  = document.getElementById('newPass').value;
  const plan  = document.getElementById('newClientPlan').value;
  if (!email || !pass) { toast('Email y contraseña son requeridos', 'err'); return; }
  toast('Creando cuenta…', 'info');
  const { data, error } = await db.auth.admin ?
    db.auth.admin.createUser({ email, password: pass, email_confirm: true }) :
    db.auth.signUp({ email, password: pass });
  if (error) { toast('Error: ' + error.message, 'err'); return; }
  const uid = data?.user?.id;
  if (uid) await db.from('profiles').upsert({ id: uid, plan, subscription_status: plan === 'free' ? 'trial' : 'active' });
  closeModal();
  await loadAllData();
  renderCustomers();
  toast('Cliente creado: ' + email, 'ok');
}

async function extendTrial(id) {
  const u = allCustomers.find(c => c.id === id);
  if (!u) return;
  const current = u.trial_ends_at ? new Date(u.trial_ends_at) : new Date();
  const newDate = new Date(Math.max(current.getTime(), Date.now()) + 7 * 24 * 60 * 60 * 1000);
  const { error } = await db.from('profiles').update({
    trial_ends_at: newDate.toISOString(),
    subscription_status: 'trial'
  }).eq('id', id);
  if (error) { toast('Error: ' + error.message, 'err'); return; }
  await loadAllData();
  closeModal();
  toast(`Trial extendido 7 días para ${u.company_name || u.full_name || 'cliente'}`, 'ok');
}

async function sendPasswordReset(id) {
  const u = allCustomers.find(c => c.id === id);
  if (!u) return;
  toast('Usa Supabase Dashboard → Authentication para enviar el reset por email', 'info');
}

async function deleteCust(id) {
  const u = allCustomers.find(c => c.id === id);
  if (!confirm(`¿Cancelar suscripción de "${u?.company_name || u?.id}"?\n\nEsto no elimina la cuenta, solo cambia el estado a "Cancelado".`)) return;
  await db.from('profiles').update({ subscription_status: 'cancelled', plan: 'free' }).eq('id', id);
  await loadAllData();
  if (currentPageName === 'customers') renderCustomers();
  toast('Suscripción cancelada', 'err');
}

function closeModal() {
  document.getElementById('customerModal').classList.add('hidden');
}

document.getElementById('customerModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ══ SETTINGS ACTIONS ═════════════════════════════
async function saveProfile() {
  const name = document.getElementById('settingsName')?.value || '';
  const { error } = await db.from('profiles').update({ full_name: name }).eq('id', adminSession.user.id);
  if (error) { toast('Error: ' + error.message, 'err'); return; }
  adminProfile.full_name = name;
  document.getElementById('adminName').textContent = name || adminSession.user.email;
  document.getElementById('adminAvatar').textContent = (name || 'A').charAt(0).toUpperCase();
  toast('Perfil actualizado', 'ok');
}

async function sendSelfReset() {
  const email = adminSession?.user?.email;
  if (!email) return;
  await db.auth.resetPasswordForEmail(email, { redirectTo: 'https://horizen.com.mx/reset-password.html' });
  toast('Enlace enviado a ' + email, 'ok');
}

function confirmLogout() {
  if (confirm('¿Cerrar sesión de administrador?')) signOut();
}

// ══ GLOBAL SEARCH ════════════════════════════════
function handleGlobalSearch(q) {
  if (!q) return;
  setPage('customers', document.querySelector('[data-page="customers"]'));
  setTimeout(() => {
    const input = document.getElementById('custSearch');
    if (input) { input.value = q; searchCustomers(q); }
  }, 100);
}

// ══ EXPORT ═══════════════════════════════════════
function exportCurrentCSV() {
  if (currentPageName === 'customers') exportCustomersCSV();
  else if (currentPageName === 'payments') exportPaymentsCSV();
  else toast('Navega a Clientes o Pagos para exportar', 'info');
}

function downloadCSV(rows, filename) {
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,﻿' + encodeURIComponent(csv);
  a.download = filename + '.csv';
  a.click();
}

function copyText(txt) {
  navigator.clipboard.writeText(txt).then(() => toast('Copiado al portapapeles', 'ok'));
}

function toast(msg, type = 'ok') {
  const colors = { ok:'var(--ok)', err:'var(--danger)', info:'var(--info)' };
  const icons  = { ok:'✓', err:'✕', info:'ℹ' };
  const el = document.createElement('div');
  el.style.cssText = `background:var(--bg2);border:1px solid ${colors[type]}33;color:var(--text);
    padding:.75rem 1.1rem;border-radius:10px;font-size:.82rem;font-weight:500;
    box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:.6rem;
    border-left:3px solid ${colors[type]};animation:slideIn .3s ease;max-width:360px`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

const adminStyleTag = document.createElement('style');
adminStyleTag.textContent = `
  @keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
`;
document.head.appendChild(adminStyleTag);
</script>

<div id="belvo"></div>
